services:
  app:
    container_name: plusai-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    #it mounts the local code files inside container without over writing the node_modules for hot reloading
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      # Override DATABASE_URL so the app connects to the postgres container (not localhost)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      #must set these envs else hot module not work, it will tell nextjs to pool for the changes
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: 100

  postgres:
    container_name: plusai-postgres
    image: postgres:alpine
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plusai
    volumes:
      - plusai_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  plusai_db_data:
